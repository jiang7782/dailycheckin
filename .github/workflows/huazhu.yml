name: Huazhu Checkinname: Huazhu Checkin

on:
 schedule:
 - cron: '0 23 * * *'
 workflow_dispatch:

jobs:
 build:
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4
 - uses: actions/setup-python@v5
 with:
 python-version: '3.12'
 - name: Install dependencies
 run: pip install dailycheckin
 - name: Run Huazhu Checkin
 env:
 HUAZHU_TOKEN: ${{ secrets.HUAZHU_TOKEN }}
 run: dailycheckin --method huazhu


